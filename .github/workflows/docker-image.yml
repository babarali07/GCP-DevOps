name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths: 
      - 'github-actions/Docker/**'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: 
        docker build . --file Dockerfile --tag hello-world-python-app:$(date +%s)
      working-directory: github-actions/Docker

  publish-image:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Push Docker image
      run:
        docker login -u babarali07 -p ${{ secrets.DOCKER_HUB_TOKEN }}
        docker push babarali07/gcp-devops/hello-world-python-app:latest
      working-directory: github-actions/Docker