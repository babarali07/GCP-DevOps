# This workflow applies Terraform configuration for the GCSbucket WIF setup.
# Google Cloud authentication is performed through Workload Identity Federation (WIF)
# using GitHub OIDC and the repository secrets WIF_PROVIDER and GCP_SERVICE_ACCOUNT.
# Terraform CLI is configured for the workflow, and a Terraform Cloud API token may still be used
# when the backend requires it.
#
# Documentation for `hashicorp/setup-terraform` is located here: https://github.com/hashicorp/setup-terraform
#
# To use this workflow, you will need to complete the following setup steps.
#
# 1. Create a `development.tf` file in the root of this repository with the `remote` backend and one or more resources defined.
#   Example `development.tf`:
#     # The configuration for the `remote` backend.
#     terraform {
#       backend "remote" {
#         # The name of your Terraform Cloud organization.
#         organization = "example-organization"
#
#         # The name of the Terraform Cloud workspace to store Terraform state files in.
#         workspaces {
#           name = "example-workspace"
#         }
#       }
#     }
#
#     # An example resource that does nothing.
#     resource "null_resource" "example" {
#       triggers = {
#         value = "A example resource that does nothing!"
#       }
#     }
#
#
# 2. Generate a Terraform Cloud user API token and store it as a GitHub secret (e.g. TF_API_TOKEN) on this repository.
#   Documentation:
#     - https://www.terraform.io/docs/cloud/users-teams-organizations/api-tokens.html
#     - https://help.github.com/en/actions/configuring-and-managing-workflows/creating-and-storing-encrypted-secrets
#
# 3. Reference the GitHub secret in step using the `hashicorp/setup-terraform` GitHub Action.
#   Example:
#     - name: Setup Terraform
#       uses: hashicorp/setup-terraform@v1
#       with:
#         cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

name: 'Terraform GCSbucket with WIF'

on:
  push:
    branches: [development]
    paths:
      - 'github-actions/GCSbucket-WIF/**'

permissions:
  contents: read
  id-token: write  # Required for GitHub OIDC token exchange with Workload Identity Federation

jobs:
  terraform:
    name: 'Terraform GCSbucket with WIF'
    runs-on: ubuntu-latest
    environment: production

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # Authenticate to Google Cloud using Workload Identity Federation (WIF)
    # This exchanges the GitHub OIDC token for short-lived GCP credentials.
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file
    # when a Terraform Cloud API token is needed by the backend.
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

    # Create terraform.tfvars file from GitHub Secrets
    # This step generates the terraform.tfvars file with sensitive values stored in GitHub Secrets
    - name: Create terraform.tfvars
      run: |
        cat > terraform.tfvars << EOF
        project_id = "${{ secrets.GCP_PROJECT_ID }}"
        bucket_name = "${{ secrets.GCS_BUCKET_NAME }}"
        EOF
      working-directory: github-actions/GCSbucket-WIF

    # Format terraform.tfvars file
    # Ensures the generated terraform.tfvars file adheres to Terraform formatting standards because it is not on the working directory and is generated dynamically.
    - name: Format terraform.tfvars
      run: terraform fmt terraform.tfvars
      working-directory: github-actions/GCSbucket-WIF   

    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, and installing plugins
    - name: Terraform Init
      run: terraform init
      working-directory: github-actions/GCSbucket-WIF

    # Checks that all Terraform configuration files adhere to a canonical format
    - name: Terraform Format
      run: terraform fmt -check
      working-directory: github-actions/GCSbucket-WIF 

    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false
      working-directory: github-actions/GCSbucket-WIF

      # On push to "development", build or change infrastructure according to Terraform configuration files
      # Note: It is recommended to set up a required "strict" status check in your repository for "Terraform Cloud". See the documentation on "strict" required status checks for more information: https://help.github.com/en/github/administering-a-repository/types-of-required-status-checks
    - name: Terraform Apply
      if: github.ref == 'refs/heads/development' && github.event_name == 'push' #this step will execute only for push events to development (it won't run for PRs, pushes to other branches, tags, or other event types)
      run: terraform apply -auto-approve -input=false
      working-directory: github-actions/GCSbucket-WIF